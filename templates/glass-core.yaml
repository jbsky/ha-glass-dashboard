  "field_title": {
    "type": "custom:button-card",
    "variables": {
      "sensors": [],
      "secondary_sensors": [],
      "name_sensors": []
    },
    "custom_fields": {
      "title_left": {
        "card": {
          "template": "title_template",
          "type": "custom:button-card",
          "entity": "[[[\n  if (variables.sensors && variables.sensors.length > 0 && states[variables.sensors[0]].state)\n    return variables.sensors[0];\n  return '';\n]]]",
          "name": "[[[\n  if( variables.sensors[0] === undefined)\n    return ''\n  if (variables.sensors.length < 2 && variables.secondary_sensors && variables.secondary_sensors.length > 0 && states[variables.secondary_sensors[0]].state) {\n  if (variables.name_sensors[0] && variables.sensors[0] && variables.secondary_sensors[0])\n    return variables.name_sensors[0] + ' ' + states[variables.sensors[0]].state + states[variables.sensors[0]].attributes.unit_of_measurement  + ' / ' + states[variables.secondary_sensors[0]].state + states[variables.secondary_sensors[0]].attributes.unit_of_measurement ;\n  if (variables.name_sensors[0] && variables.sensors[0])\n    return variables.name_sensors[0] + ' ' + states[variables.sensors[0]].state + states[variables.sensors[0]].attributes.unit_of_measurement ;\n  if (variables.name_sensors[0] && variables.secondary_sensors[0])\n    return variables.name_sensors[0] + ' ' + states[variables.secondary_sensors[0]].state + states[variables.secondary_sensors[0]].attributes.unit_of_measurement ;\n  if (variables.sensors[0] && variables.secondary_sensors[0])\n    return states[variables.sensors[0]].state + states[variables.sensors[0]].attributes.unit_of_measurement  + ' / ' + states[variables.secondary_sensors[0]].state + states[variables.secondary_sensors[0]].attributes.unit_of_measurement ;\n  if (variables.name_sensors[0] )\n    return variables.name_sensors[0] ;\n  if (variables.secondary_sensors[0])\n    return states[variables.secondary_sensors[0]].state + states[variables.secondary_sensors[0]].attributes.unit_of_measurement ;\n  }\nelse\n  if (variables.name_sensors[0] && variables.sensors[0])\n    return variables.name_sensors[0] + ' ' + states[variables.sensors[0]].state + states[variables.sensors[0]].attributes.unit_of_measurement;\n  return states[variables.sensors[0]].state + states[variables.sensors[0]].attributes.unit_of_measurement ;\n]]]",
          "styles": {
            "name": [
              {
                "text-align": "left"
              },
              {
                "color": "[[[ \n  var active = false;\n  if (!variables.commands)\n     return \"#E0E0E0\";\n  for (var i=0; i<variables.commands.length; i++) {\n    if (states[variables.commands[i]].state === 'on') {\n      active = true;\n      break;\n    }\n  }\n  return active ? \"#FFC507\" : \"#E0E0E0\";\n]]]\n"
              }
            ],
            "card": [
              {
                "background": "[[[ \n  var active = false;\n  if (!variables.commands)\n     return \"transparent\";\n  for (var i=0; i<variables.commands.length; i++) {\n    if (states[variables.commands[i]].state === 'on') {\n      active = true;\n      break;\n    }\n  }\n  return active ? \"linear-gradient(90deg, rgba(100,100,100,1.0) 0%, rgba(28,28,28,0.0) 100%)\" : \"\";\n]]]\n"
              }
            ]
          }
        }
      },
      "title_right": {
        "card": {
          "template": "title_template",
          "type": "custom:button-card",
          "entity": "[[[\n  if (variables.sensors && variables.sensors.length > 1 && states[variables.sensors[1]].state)\n    return variables.sensors[1];\n  return '';\n]]]",
          "name": "[[[\n  if( variables.sensors[1] === undefined)\n    return ''\n  if (variables.name_sensors[1] && variables.sensors[1])\n    return variables.name_sensors[1] + ' ' + states[variables.sensors[1]].state + states[variables.sensors[1]].attributes.unit_of_measurement  ;\n  return states[variables.sensors[1]].state + states[variables.sensors[1]].attributes.unit_of_measurement;\n]]]",
