    ],
    "tap_action": {
      "action": "none"
    },
    "double_tap_action": {
      "action": "toggle"
    },
    "styles": {
      "card": [
        {
          "background": "transparent !important"
        },
        {
          "--ha-card-background": "transparent"
        },
        {
          "backdrop-filter": "none !important"
        },
        {
          "-webkit-backdrop-filter": "none !important"
        },
        {
          "border": "none !important"
        },
        {
          "box-shadow": "none !important"
        },
        {
          "width": "30px"
        },
        {
          "height": "30px"
        }
      ]
    }
  },
  "state_on_off": {
