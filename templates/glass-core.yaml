            },
            {
              "filter": "grayscale(100%)"
            },
            {
              "transform": "scale(1.0)"
            }
          ]
        }
      },
      {
        "value": "off2",
        "styles": {
          "card": [
            {
              "background": "rgba(255, 255, 255, 0.03)"
            },
            {
              "border-radius": "8px"
            }
          ],
          "icon": [
            {
              "color": "rgba(255, 255, 255, 0.3)"
            },
            {
