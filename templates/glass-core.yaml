# Glass Dashboard - Core Button Card Templates
# Add these to your button_card_templates in your lovelace config
# or use the dashboard package (see README)

{
  "glass_button_base": {
    "styles": {
      "card": [
        {
          "display": "flex"
        },
        {
          "flex-direction": "column"
        },
        {
          "align-items": "center"
        },
        {
          "justify-content": "center"
        },
        {
          "background": "transparent !important"
        },
        {
          "--ha-card-background": "transparent"
        },
        {
          "backdrop-filter": "none !important"
        },
        {
          "-webkit-backdrop-filter": "none !important"
        },
        {
          "border": "none !important"
        },
        {
          "box-shadow": "none !important"
        }
      ],
      "icon": [
        {
          "transition": "transform 0.2s ease, filter 0.3s ease"
        },
        {
          "transform": "scale(0.7)"
        }
      ]
    }
  },
  "glass_button": {
    "size": "80%",
    "template": "state_on_off",
    "hold_action": {
      "action": "more-info"
    },
    "styles": {
      "card": [
        {
          "padding": "0.2em"
        },
        {
          "--mdc-ripple-color": "#44729E"
        },
        {
          "--mdc-ripple-press-opacity": 0.5
        },
        {
          "color": "var(--primary-text-color, #FFFFFF)"
        },
        {
          "background": "transparent !important"
        },
        {
          "--ha-card-background": "transparent"
        },
        {
          "backdrop-filter": "none !important"
        },
        {
          "-webkit-backdrop-filter": "none !important"
        },
        {
          "border": "none !important"
        },
        {
          "box-shadow": "none !important"
        }
      ],
      "name": [
        {
          "font-size": "0.65em"
        },
        {
          "white-space": "normal"
        }
      ],
      "icon": [],
      "state": [
        {
          "font-size": "0.65em"
        },
        {
          "white-space": "normal"
        }
      ],
      "label": [
        {
          "font-size": "0.4em"
        },
        {
          "white-space": "normal"
        }
      ]
    }
  },
  "glass_container": {
    "styles": {
      "card": [
        {
          "padding": 0
        },
        {
          "border-radius": "12px"
        }
      ],
      "name": [
        {
          "border-radius": "0.4em 0.4em 0 0"
        },
        {
          "padding": "0.1em"
        },
        {
          "width": "100%"
        },
        {
          "font-weight": "bold"
        }
      ],
      "grid": [
        {
          "grid-template-areas": "\"i\" \"n\" \"buttons\""
        },
        {
          "grid-template-columns": "1fr"
        },
        {
          "grid-template-rows": "1fr min-content min-content"
        }
      ],
      "custom_fields": {
        "buttons": [
          {
            "margin": 0
          },
          {
            "padding": "0.3em"
          }
        ]
      }
    }
  },
  "glass_climate": {
    "template": "glass_container",
    "triggers_update": "[[[ return variables.climate_entity; ]]]",
    "custom_fields": {
      "power": {
        "card": {
          "size": "50%",
          "hold_action": {
            "action": "more-info"
          },
          "double_tap_action": {
            "action": "toggle"
          },
          "tap_action": {
            "action": "none"
          },
          "show_name": false,
          "show_state": false,
          "show_value": false,
          "show_icon": true,
          "type": "custom:button-card",
          "template": null,
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "entity": "[[[\n    return variables.climate_entity;\n]]]\n",
          "styles": {
            "card": [
              {
                "width": "60px"
              },
              {
                "border": "none !important"
              },
              {
                "background": "transparent !important"
              },
              {
                "--ha-card-background": "transparent"
              },
              {
                "backdrop-filter": "none !important"
              },
              {
                "-webkit-backdrop-filter": "none !important"
              },
              {
                "box-shadow": "none !important"
              }
            ]
          }
        }
      },
      "title": {
        "card": {
          "size": "50%",
          "hold_action": {
            "action": "more-info"
          },
          "double_tap_action": {
            "action": "toggle"
          },
          "tap_action": {
            "action": "none"
          },
          "show_name": true,
          "show_state": false,
          "show_value": false,
          "show_icon": false,
          "type": "custom:button-card",
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "entity": "[[[\n    return variables.climate_entity;\n]]]\n",
          "name": "[[[\n      return states[variables.climate_entity].attributes.friendly_name;\n]]]\n",
          "styles": {
            "card": [
              {
                "border": "none !important"
              },
              {
                "background": "transparent !important"
              },
              {
                "--ha-card-background": "transparent"
              },
              {
                "backdrop-filter": "none !important"
              },
              {
                "-webkit-backdrop-filter": "none !important"
              },
              {
                "box-shadow": "none !important"
              }
            ],
            "name": [
              {
                "font-size": "1.1em"
              },
              {
                "align-self": "flex-end"
              },
              {
                "font-weight": "bold"
              },
              {
                "color": "#FFFFFF"
              }
            ]
          }
        }
      },
      "statut": {
        "card": {
          "hold_action": {
            "action": "more-info"
          },
          "double_tap_action": {
            "action": "toggle"
          },
          "tap_action": {
            "action": "none"
          },
          "show_name": true,
          "show_state": false,
          "show_value": false,
          "show_icon": false,
          "type": "custom:button-card",
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "entity": "[[[\n    return variables.climate_entity;\n]]]\n",
          "name": "[[[\n    switch(states[variables.climate_entity].state){\n      case \"heat\": \n      return \"chauffage - \" + states[variables.climate_entity].attributes.current_temperature;\n      break;\n      case \"cool\":\n          return \"climatisation - \"+ states[variables.climate_entity].attributes.current_temperature;\n      break;\n      case \"off\": \n          return \"éteint - \" + states[variables.climate_entity].attributes.current_temperature;\n      break;\n    }\n    return states[variables.climate_entity].state;\n\n]]]\n",
          "styles": {
            "card": [
              {
                "border": "none !important"
              },
              {
                "background": "transparent !important"
              },
              {
                "--ha-card-background": "transparent"
              },
              {
                "backdrop-filter": "none !important"
              },
              {
                "-webkit-backdrop-filter": "none !important"
              },
              {
                "box-shadow": "none !important"
              }
            ],
            "name": [
              {
                "font-size": "0.7em"
              },
              {
                "align-self": "flex-end"
              },
              {
                "color": "rgba(255, 255, 255, 0.7)"
              }
            ]
          }
        }
      },
      "up": {
        "card": {
          "template": "icon_tiny",
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "tap_action": {
            "action": "call-service",
            "service": "climate.set_temperature",
            "target": {
              "entity_id": "[[[\n    return variables.climate_entity;\n]]]\n"
            },
            "service_data": {
              "temperature": "[[[\n      let max_temp = states[variables.climate_entity].attributes.max_temp;\n      let currentTemp = states[variables.climate_entity].attributes.temperature;\n      let step = states[variables.climate_entity].attributes.target_temp_step;\n      let newTemp = currentTemp + step;\n\n      if (newTemp <= max_temp) {\n          return newTemp;\n      }\n      return currentTemp;\n]]]\n"
            }
          },
          "show_name": false,
          "show_state": false,
          "show_value": false,
          "show_icon": true,
          "icon": "mdi:plus",
          "type": "custom:button-card"
        }
      },
      "current": {
        "card": {
          "size": "50%",
          "hold_action": {
            "action": "more-info"
          },
          "double_tap_action": {
            "action": "more-info"
          },
          "tap_action": {
            "action": "more-info"
          },
          "show_name": true,
          "show_state": false,
          "show_value": false,
          "show_icon": false,
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "name": "[[[ return states[variables.climate_entity].attributes.temperature ; ]]]\n",
          "type": "custom:button-card",
          "entity": "[[[\n        return variables.climate_entity;\n]]]\n",
          "styles": {
            "icon": null,
            "card": [
              {
                "--mdc-ripple-color": "#44729E"
              },
              {
                "--mdc-ripple-press-opacity": 1
              },
              {
                "width": "40px"
              },
              {
                "height": "40px"
              },
              {
                "padding": 0
              },
              {
                "margin": 0
              },
              {
                "--mdc-icon-button-size": "24px"
              },
              {
                "background": "transparent !important"
              },
              {
                "border": "none !important"
              },
              {
                "border-radius": "50%"
              },
              {
                "--ha-card-background": "transparent"
              },
              {
                "backdrop-filter": "none !important"
              },
              {
                "-webkit-backdrop-filter": "none !important"
              },
              {
                "box-shadow": "none !important"
              }
            ],
            "name": [
              {
                "font-size": "0.9em"
              },
              {
                "color": "#FFFFFF"
              }
            ]
          }
        }
      },
      "down": {
        "card": {
          "template": "icon_tiny",
          "hold_action": {
            "action": "more-info"
          },
          "double_tap_action": {
            "action": "more-info"
          },
          "triggers_update": "[[[\n    return variables.climate_entity;\n]]]\n",
          "tap_action": {
            "action": "call-service",
            "service": "climate.set_temperature",
            "target": {
              "entity_id": "[[[\n    return variables.climate_entity;\n]]]\n"
            },
            "service_data": {
              "temperature": "[[[\n      let min_temp = states[variables.climate_entity].attributes.min_temp;\n      let currentTemp = states[variables.climate_entity].attributes.temperature;\n      let step = states[variables.climate_entity].attributes.target_temp_step;\n      let newTemp = currentTemp - step;\n\n      if (min_temp <= newTemp) {\n          return newTemp;\n      }\n      return currentTemp;\n]]]\n"
            }
          },
          "show_name": false,
          "show_state": false,
          "show_value": false,
          "show_icon": true,
          "icon": "mdi:minus",
          "type": "custom:button-card"
        }
      },
      "sensor0": {
        "card": {
          "type": "custom:button-card",
          "template": "icon_tiny",
          "color": "#039be5",
          "triggers_update": "[[[\n    return variables.secondary_sensors[0];\n]]]\n",
          "icon": "[[[\n  if (states[variables.secondary_sensors[0]].state == 'night')  return \"mdi:fan\"\n  if (states[variables.secondary_sensors[0]].state == 'level1') return \"mdi:fan-off\"\n  if (states[variables.secondary_sensors[0]].state == 'level2') return \"mdi:fan-speed-1\"\n  if (states[variables.secondary_sensors[0]].state == 'level3') return \"mdi:fan-speed-2\"\n  if (states[variables.secondary_sensors[0]].state == 'level4') return \"mdi:fan-speed-3\"\n  if (states[variables.secondary_sensors[0]].state == 'level5') return \"mdi:fan-plus\"\n  return \"mdi:fan-question\" // Icône par défaut si aucune condition n'est satisfaite\n]]]\n",
          "entity": "[[[ \n  if (variables.secondary_sensors && variables.secondary_sensors.length > 0 && states[variables.secondary_sensors[0]]) \n    return variables.secondary_sensors[0];\n  return ''; \n]]]\n",
          "value": "[[[\n  return states[variables.secondary_sensors[0]].state;\n]]]\n",
          "state": [
            {
              "value": "night",
              "name": "Mode Nuit"
            },
            {
              "value": "level1",
              "name": "Arrêt"
            },
            {
              "value": "level2",
              "name": "Vitesse 1"
            },
            {
              "value": "level3",
              "name": "Vitesse 2"
            },
            {
              "value": "level4",
              "name": "Vitesse 3"
            },
            {
              "value": "level5",
              "name": "Turbo"
            }
          ]
        }
      },
      "sensor1": {
        "card": {
          "type": "custom:button-card",
          "template": "icon_tiny",
          "entity": "[[[ \n      if (variables.secondary_sensors && variables.secondary_sensors.length > 1 && states[variables.secondary_sensors[1]].state) \n        return variables.secondary_sensors[1];\n      return ''; \n]]]\n"
        }
      },
      "sensor2": {
        "card": {
          "size": "140%",
          "type": "custom:button-card",
          "template": "style_none",
          "show_icon": false,
          "show_state": true,
          "show_name": false,
          "entity": "[[[ \n      if (variables.secondary_sensors && variables.secondary_sensors.length > 2 && states[variables.secondary_sensors[2]].state) \n        return variables.secondary_sensors[2];\n      return ''; \n]]]\n",
          "styles": {
            "state": [
              {
                "font-size": "9px"
              }
            ]
          }
        }
      }
    },
    "styles": {
      "custom_fields": {
        "power": [
          {
            "position": "absolute"
          },
          {
            "left": "-1%"
          }
        ],
        "up": [
          {
            "position": "absolute"
          },
          {
            "right": "0%"
          }
        ],
        "current": [
          {
            "position": "absolute"
          },
          {
            "right": "7%"
          }
        ],
        "down": [
          {
            "position": "absolute"
          },
          {
            "right": "20%"
          }
        ],
        "title": [
          {
            "position": "absolute"
          },
          {
            "left": "50px"
          },
          {
            "top": "5%;"
          }
        ],
        "statut": [
          {
            "position": "absolute"
          },
          {
            "left": "50px"
          },
          {
            "top": "50%;"
          }
        ],
        "sensor0": [
          {
            "position": "absolute"
          },
          {
            "left": "45%;"
          }
        ],
        "sensor1": [
          {
            "position": "absolute"
          },
          {
            "left": "52%;"
          }
        ],
        "sensor2": [
          {
            "position": "absolute"
          },
          {
            "left": "59%;"
          }
        ]
      }
    },
    "aspect_ratio": "20/3"
  },
  "glass_cover": {
    "variables": {
      "accent_open": "#42A5F5",
      "accent_closed": "#546E7A",
      "accent_moving": "#7E57C2"
    },
    "show_name": true,
    "show_state": false,
    "show_icon": true,
    "tap_action": {
      "action": "toggle"
    },
    "hold_action": {
      "action": "more-info"
    },
    "icon": "[[[\n  const pos = entity.attributes.current_position;\n  if (entity.state === 'closing' || entity.state === 'opening') return 'mdi:window-shutter-alert';\n  if (pos === 0) return 'mdi:window-shutter';\n  return 'mdi:window-shutter-open';\n]]]",
    "custom_fields": {
      "position": "[[[\n  const pos = entity.attributes.current_position;\n  if (entity.state === 'closing')\n    return '<span style=\"font-size:9px;font-weight:bold;color:#fff;\">fermeture</span>';\n  if (entity.state === 'opening')\n    return '<span style=\"font-size:9px;font-weight:bold;color:#fff;\">ouverture</span>';\n  if (pos === 0)\n    return '<span style=\"font-size:9px;font-weight:bold;color:#fff;\">ferm\\u00e9</span>';\n  if (pos === 100)\n    return '<span style=\"font-size:9px;font-weight:bold;color:#fff;\">ouvert</span>';\n  if (pos !== undefined && pos !== null)\n    return `<span style=\"font-size:9px;font-weight:bold;color:#fff;\">${pos}%</span>`;\n  return '';\n]]]"
    },
    "styles": {
      "card": [
        {
          "height": "80px"
        },
        {
          "border-left": "[[[\n  if (entity.state === 'closing' || entity.state === 'opening')\n    return '3px solid ' + variables.accent_moving;\n  if (entity.attributes.current_position === 0)\n    return '3px solid ' + variables.accent_closed;\n  return '3px solid ' + variables.accent_open;\n]]]"
        },
        {
          "transition": "all 0.3s ease-in-out"
        }
      ],
      "icon": [
        {
          "width": "36px"
        },
        {
          "color": "[[[\n  if (entity.state === 'closing' || entity.state === 'opening')\n    return variables.accent_moving;\n  if (entity.attributes.current_position === 0)\n    return 'rgba(255,255,255,0.5)';\n  return variables.accent_open;\n]]]"
        },
        {
          "filter": "[[[\n  if (entity.state !== 'closed' && entity.attributes.current_position !== 0)\n    return 'drop-shadow(0 0 5px rgba(66,165,245,0.6))';\n  return 'none';\n]]]"
        },
        {
          "animation": "[[[\n  if (entity.state === 'closing' || entity.state === 'opening')\n    return 'pulse-shutter 1.5s ease-in-out infinite';\n  return 'none';\n]]]"
        }
      ],
      "name": [
        {
          "font-size": "0.85em"
        },
        {
          "font-weight": "bold"
        },
        {
          "color": "#FFFFFF"
        }
      ],
      "custom_fields": {
        "position": [
          {
            "position": "absolute"
          },
          {
            "bottom": "4px"
          },
          {
            "right": "6px"
          },
          {
            "background": "rgba(0,0,0,0.4)"
          },
          {
            "border-radius": "8px"
          },
          {
            "padding": "1px 6px"
          }
        ]
      }
    },
    "extra_styles": "\n@keyframes pulse-shutter {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.5; }\n}\n"
  },
  "glass_garage": {
    "variables": {
      "accent_open": "#FF9800",
      "accent_closed": "#546E7A"
    },
    "show_name": true,
    "show_state": false,
    "show_icon": true,
    "icon": "[[[\n  return entity.state === 'on' ? 'mdi:garage-open-variant' : 'mdi:garage-variant';\n]]]",
    "tap_action": {
      "action": "call-service",
      "service": "script.turn_on",
      "service_data": {
        "entity_id": "[[[ return variables.script_entity || 'script.pulse_porte_garage' ]]]"
      }
    },
    "hold_action": {
      "action": "more-info"
    },
    "styles": {
      "card": [
        {
          "height": "80px"
        },
        {
          "border-left": "[[[\n  return '3px solid ' + (entity.state === 'on' ? variables.accent_open : variables.accent_closed);\n]]]"
        },
        {
          "transition": "all 0.3s ease-in-out"
        }
      ],
      "icon": [
        {
          "width": "36px"
        },
        {
          "color": "[[[\n  return entity.state === 'on' ? variables.accent_open : 'rgba(255,255,255,0.5)';\n]]]"
        },
        {
          "filter": "[[[\n  return entity.state === 'on' ? 'drop-shadow(0 0 5px rgba(255,152,0,0.6))' : 'none';\n]]]"
        }
      ],
      "name": [
        {
          "font-size": "0.85em"
        },
        {
          "font-weight": "bold"
        },
        {
          "color": "[[[\n  return entity.state === 'on' ? variables.accent_open : '#FFFFFF';\n]]]"
        }
      ]
    }
  },
  "icon_tiny": {
    "size": "150%",
    "show_name": false,
    "show_state": false,
    "show_value": false,
    "show_icon": true,
    "styles": {
